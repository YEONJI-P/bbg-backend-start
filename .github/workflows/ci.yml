name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
# ID 토큰을 발급받을 수 있는 권한 명시
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

# 최신 권장 액션으로 교체 (경고 해결)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 직접 gradlew 명령어를 실행하는 방식이 현재 표준
    - name: Build with Gradle
      run: ./gradlew build

    # 빌드된 Jar 파일을 Docker 이미지로 빌드 테스트
    - name: Docker image build check
      run: docker build -t bbg-app .


# 1. GCP 인증 (Workload Identity Federation 방식)
    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/142990968320/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-action-pusher@project-f4d2acb6-c4a9-4f38-9be.iam.gserviceaccount.com'

    # 2. Docker를 GCP Artifact Registry에 로그인 시키기
    - name: 'Docker Login'
      run: |
        gcloud auth configure-docker asia-northeast3-docker.pkg.dev

    # 3. 이미지 빌드 및 푸시 (서울 리전 저장소 주소 사용)
    # 프로젝트 ID가 복잡하므로 직접 적어주는 것이 안전
    - name: 'Build and Push'
      run: |
        
        docker build -t asia-northeast3-docker.pkg.dev/project-f4d2acb6-c4a9-4f38-9be/bbg-docker-repo/bbg-app:latest .
        docker push asia-northeast3-docker.pkg.dev/project-f4d2acb6-c4a9-4f38-9be/bbg-docker-repo/bbg-app:latest

    - name: 'Deploy to Cloud Run'
      run: |
        gcloud run deploy bbg-app-service \
          --image asia-northeast3-docker.pkg.dev/project-f4d2acb6-c4a9-4f38-9be/bbg-docker-repo/bbg-app:latest \
          --region asia-northeast3 \
          --platform managed \
          --allow-unauthenticated
