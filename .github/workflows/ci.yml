name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ] # 부기님의 메인 브랜치명 확인 (main 또는 master)
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

# 최신 권장 액션으로 교체 (경고 해결)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 직접 gradlew 명령어를 실행하는 방식이 현재 표준입니다
    - name: Build with Gradle
      run: ./gradlew build

    # 빌드된 Jar 파일을 Docker 이미지로 빌드 테스트
    - name: Docker image build check
      run: docker build -t bbg-app .