spring:
  datasource:
    # URL도 변수를 활용해 동적으로 구성 
    # 로컬 H2 DB와 충돌 방지 드라이버 명시 
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql:///${DB_NAME:default_name}?cloudSqlInstance=${DB_INSTANCE_NAME:default_name}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: postgres
    password: ${DB_PASSWORD:default_pass}
    
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true